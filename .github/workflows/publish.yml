name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch|minor|major)'
        required: true
        default: 'patch'

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: echo "Published to npm!"

  vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: vscode
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish
        working-directory: vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  github-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish GitHub Action
        run: |
          gh api -X POST /repos/${{ github.repository }}/releases \
            --field tag_name=v${{ github.event.release.tag_name }} \
            --field name="ReviewPilot Action v${{ github.event.release.tag_name }}" \
            --field body="GitHub Action release for ReviewPilot"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
