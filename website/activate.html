<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate License — ReviewPilot</title>
  <meta name="description" content="Activate your ReviewPilot Pro or Team license key.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #e0e0e0;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 0 24px; flex: 1; }

    nav {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 0;
    }
    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .logo { font-size: 1.4rem; font-weight: 700; color: #f0f6fc; text-decoration: none; }
    nav .logo span { color: #58a6ff; }
    nav a { color: #8b949e; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #f0f6fc; }

    main { padding: 80px 0; flex: 1; }
    h1 { font-size: 2.2rem; font-weight: 800; color: #f0f6fc; margin-bottom: 8px; }
    p.subtitle { color: #8b949e; margin-bottom: 40px; font-size: 1.05rem; }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 32px;
    }

    .form-group { margin-bottom: 20px; }
    label { display: block; color: #c9d1d9; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; }
    input[type="text"] {
      width: 100%;
      padding: 14px 20px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #f0f6fc;
      font-size: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { outline: none; border-color: #58a6ff; }
    input[type="text"]::placeholder { color: #484f58; font-family: -apple-system, sans-serif; }

    button {
      width: 100%;
      background: #238636;
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2ea043; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 8px;
      display: none;
    }
    .result.success { display: block; background: rgba(35, 134, 54, 0.15); border: 1px solid #238636; }
    .result.error { display: block; background: rgba(218, 54, 51, 0.15); border: 1px solid #da3633; }
    .result h3 { margin-bottom: 8px; }
    .result.success h3 { color: #3fb950; }
    .result.error h3 { color: #ff6b6b; }
    .result p { color: #c9d1d9; font-size: 0.95rem; margin-bottom: 8px; }
    .result code {
      display: block;
      background: #0d1117;
      padding: 12px 16px;
      border-radius: 6px;
      color: #58a6ff;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      margin-top: 12px;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .cli-note {
      margin-top: 32px;
      padding: 20px;
      background: rgba(56, 139, 253, 0.08);
      border: 1px solid rgba(56, 139, 253, 0.2);
      border-radius: 8px;
    }
    .cli-note h3 { color: #58a6ff; font-size: 1rem; margin-bottom: 8px; }
    .cli-note p { color: #8b949e; font-size: 0.9rem; }
    .cli-note code {
      color: #58a6ff;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    footer {
      background: #0d1117;
      border-top: 1px solid #21262d;
      padding: 40px 0;
      text-align: center;
      color: #484f58;
      font-size: 0.85rem;
    }
    footer a { color: #8b949e; text-decoration: none; }
    footer a:hover { color: #58a6ff; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">Review<span>Pilot</span></a>
      <a href="/">Back to Home</a>
    </div>
  </nav>

  <main>
    <div class="container">
      <h1>Activate Your License</h1>
      <p class="subtitle">Enter your Gumroad license key to activate ReviewPilot Pro or Team.</p>

      <div class="card">
        <div class="form-group">
          <label for="licenseKey">License Key</label>
          <input type="text" id="licenseKey" placeholder="Paste your Gumroad license key here" autocomplete="off" spellcheck="false">
        </div>
        <button id="activateBtn" onclick="activateLicense()">Verify & Activate</button>

        <div id="result" class="result"></div>
      </div>

      <div class="cli-note">
        <h3>CLI Activation</h3>
        <p>After verifying your license above, activate it in your terminal:</p>
        <code id="cliCmd">reviewpilot license activate YOUR_KEY_HERE</code>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 ReviewPilot. MIT License.</p>
    </div>
  </footer>

  <script>
    async function activateLicense() {
      const input = document.getElementById('licenseKey');
      const btn = document.getElementById('activateBtn');
      const result = document.getElementById('result');
      const key = input.value.trim();

      if (!key) {
        alert('Please enter your license key.');
        return;
      }

      result.className = 'result';
      result.style.display = 'none';
      btn.innerHTML = '<span class="spinner"></span>Verifying...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/verify-license', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license_key: key })
        });
        const data = await res.json();

        if (data.success) {
          const tier = (data.purchase?.variants || 'Pro').toUpperCase();
          result.className = 'result success';
          result.style.display = 'block';
          result.innerHTML = `
            <h3>License Verified!</h3>
            <p><strong>Tier:</strong> ${tier}</p>
            <p><strong>Email:</strong> ${data.purchase?.email || 'N/A'}</p>
            <p>Now activate it in your terminal with this command:</p>
            <code>reviewpilot license activate ${key}</code>
          `;
          document.getElementById('cliCmd').textContent = `reviewpilot license activate ${key}`;
        } else {
          throw new Error(data.message || 'Invalid license key');
        }
      } catch (err) {
        result.className = 'result error';
        result.style.display = 'block';
        result.innerHTML = `
          <h3>Verification Failed</h3>
          <p>${err.message}</p>
          <p>Make sure you've copied the full license key from your Gumroad purchase email.</p>
        `;
      } finally {
        btn.innerHTML = 'Verify & Activate';
        btn.disabled = false;
      }
    }

    document.getElementById('licenseKey').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') activateLicense();
    });
  </script>
</body>
</html>
